version: "3.9"

services:
  # PostgreSQL - primary relational database
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: exchange
      POSTGRES_PASSWORD: exchange_dev
      POSTGRES_DB: exchange
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./internal/db/postgres/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U exchange"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis - cache and real-time data
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Kafka - event bus
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 5

  # ClickHouse - analytics and time-series
  clickhouse:
    image: clickhouse/clickhouse-server:24-alpine
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      CLICKHOUSE_DB: exchange
      CLICKHOUSE_USER: exchange
      CLICKHOUSE_PASSWORD: exchange_dev
    volumes:
      - chdata:/var/lib/clickhouse

  # Local Ethereum node for development (Anvil)
  anvil:
    image: ghcr.io/foundry-rs/foundry:latest
    platform: linux/amd64
    command: anvil --host 0.0.0.0 --port 8545 --block-time 2
    ports:
      - "8545:8545"

volumes:
  pgdata:
  redisdata:
  chdata:
